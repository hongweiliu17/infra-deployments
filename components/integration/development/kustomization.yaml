apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/integration-service/config/default?ref=6256714d8189a4a8085c8e2c6d9b69a737f26e1d
  - https://github.com/konflux-ci/integration-service/config/snapshotgc?ref=6256714d8189a4a8085c8e2c6d9b69a737f26e1d
images:
  - name: quay.io/konflux-ci/integration-service
    newName: quay.io/hongweiliu/integration-service
    newTag: "17611"
configMapGenerator:
  - name: integration-config
    literals:
      - CONSOLE_NAME="Konflux Dev version"
      - CONSOLE_URL=""
      - CONSOLE_URL_TASKLOG=""
  - name: pipelinerun-options
    literals:
      - PIPELINE_TIMEOUT="6h"
      - TASKS_TIMEOUT="4h"
      - FINALLY_TIMEOUT="2h"
namespace: integration-service
patches:
  - path: manager_resources_patch.yaml
  - path: snapshotgc_inputs_patch.yaml
    target:
      kind: CronJob
      name: snapshot-garbage-collector
components:
  - ../rh-certs
